name: Build, Test and Release

on:
  push:
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (builds and packages but does not publish release)'
        required: true
        type: boolean
        default: true

jobs:
  test:
    name: Test on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install libcec for testing
        run: |
          sudo apt-get update
          sudo apt-get install -y libcec-dev libp8-platform-dev

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Run vet
        run: CGO_ENABLED=1 go vet ./...

      - name: Run tests
        run: CGO_ENABLED=1 go test -v ./...

  build:
    name: Build (${{ matrix.goarch }})
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcec-dev libp8-platform-dev

      - name: Build binary
        run: |
          mkdir -p prebuilt/${{ matrix.goarch }}
          CGO_ENABLED=1 go build -ldflags="-s -w" -o prebuilt/${{ matrix.goarch }}/cec-controller .

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: prebuilt-${{ matrix.goarch }}
          path: prebuilt/${{ matrix.goarch }}/cec-controller

  release:
    name: Package and release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Download amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: prebuilt-amd64
          path: prebuilt/amd64/

      - name: Download arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: prebuilt-arm64
          path: prebuilt/arm64/

      - name: Make binaries executable
        run: find prebuilt -type f -name cec-controller -exec chmod +x {} \;

      - name: Generate man pages
        run: |
          mkdir -p manpages
          ./prebuilt/amd64/cec-controller generate-docs --output-dir ./manpages/
          gzip -f ./manpages/cec-controller.1

      - name: Run GoReleaser (Dry Run)
        if: ${{ github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true') }}
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --snapshot --skip=publish

      - name: Run GoReleaser (Release)
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true') }}
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
