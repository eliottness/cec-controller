version: 2
project_name: cec-controller

builds:
  - id: amd64
    builder: prebuilt
    binary: cec-controller
    goos: [linux]
    goarch: [amd64]
    prebuilt:
      path: prebuilt/amd64/cec-controller

  - id: arm64
    builder: prebuilt
    binary: cec-controller
    goos: [linux]
    goarch: [arm64]
    prebuilt:
      path: prebuilt/arm64/cec-controller

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

nfpms:
  # Ubuntu/Debian packages
  - id: ubuntu-deb
    ids:
      - amd64
      - arm64
    description: "CEC Controller Service"
    maintainer: "eliottness"
    homepage: "https://github.com/eliottness/cec-controller"
    license: "GPLv3"
    formats: [deb]
    vendor: "eliottness"
    section: "utils"
    priority: "optional"
    bindir: "/usr/bin"
    file_name_template: "{{ .ProjectName }}_{{ .Version }}_ubuntu_{{ .Arch }}"
    contents:
      - src: ./cec-controller.service
        dst: /lib/systemd/system/cec-controller.service
    dependencies:
      - libcec7

  # Fedora/RHEL packages
  - id: fedora-rpm
    ids:
      - amd64
      - arm64
    description: "CEC Controller Service for Fedora/RHEL"
    maintainer: "eliottness"
    homepage: "https://github.com/eliottness/cec-controller"
    license: "GPLv3"
    formats: [rpm]
    vendor: "eliottness"
    bindir: "/usr/bin"
    file_name_template: "{{ .ProjectName }}_{{ .Version }}_fedora_{{ .Arch }}"
    contents:
      - src: ./cec-controller.service
        dst: /lib/systemd/system/cec-controller.service
    dependencies:
      - libcec

release:
  github:
    owner: eliottness
    name: cec-controller
  prerelease: auto
  draft: false
