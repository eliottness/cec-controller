name: Build, Test and Release

on:
  push:
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (builds and packages but does not publish release)'
        required: true
        type: boolean
        default: true

jobs:
  test:
    name: Test on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install libcec for testing
        run: |
          sudo apt-get update
          sudo apt-get install -y libcec-dev libp8-platform-dev

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Run vet
        run: CGO_ENABLED=1 go vet ./...

      - name: Run tests
        run: CGO_ENABLED=1 go test -v ./...

  release:
    name: build binaries
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
            go-version: stable

      - name: install dependencies
        run: |
          sudo dpkg --add-architecture arm64
          # Restrict existing sources to amd64 only, then add ports.ubuntu.com for arm64
          sudo sed -i 's/^Types: deb$/Types: deb\nArchitectures: amd64/' /etc/apt/sources.list.d/ubuntu.sources
          printf 'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse\ndeb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse\ndeb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main restricted universe multiverse\n' | sudo tee /etc/apt/sources.list.d/arm64-ports.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcec-dev libp8-platform-dev \
            libcec7:arm64 \
            gcc-aarch64-linux-gnu
          # Create .so symlink for arm64 cross-linking (libcec7:arm64 only ships the versioned .so)
          sudo ln -sf /usr/lib/aarch64-linux-gnu/libcec.so.7 /usr/lib/aarch64-linux-gnu/libcec.so
          # Create minimal pkg-config stub for arm64 cross-compilation
          sudo mkdir -p /usr/lib/aarch64-linux-gnu/pkgconfig
          printf 'Name: libcec\nDescription: libcec\nVersion: 7.0.0\nLibs: -L/usr/lib/aarch64-linux-gnu -lcec\nCflags: -I/usr/include\n' | sudo tee /usr/lib/aarch64-linux-gnu/pkgconfig/libcec.pc

      - name: Run GoReleaser (Dry Run)
        if: ${{ github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true') }}
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --snapshot --skip=publish

      - name: Run GoReleaser (Release)
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true') }}
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/